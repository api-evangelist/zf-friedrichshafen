description: ZF Friedrichshafen does not publish concrete rate-limit numbers, throttling thresholds, or response-header
  conventions. As a Tier 1 automotive supplier, integration limits are governed by partner contracts. This
  artifact records the gap.
notes: No public rate-limit documentation reachable. Integration throughput is governed by partner contracts
  and supplier portal terms.
